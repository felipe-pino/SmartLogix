server:
  port: 8083

spring:
  application:
    name: shipment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/shipment_db
    driverClassName: org.postgresql.Driver
    username: postgres
    password: '123456'

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/